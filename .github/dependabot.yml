version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - react
          - react-*
          - "@types/react*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - postcss
          - autoprefixer
      lint:
        patterns:
          - eslint
          - eslint-*
          - "@typescript-eslint/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
